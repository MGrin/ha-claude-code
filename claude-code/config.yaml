name: "Claude Code"
version: "0.3.7"
slug: "claude-code"
description: "Chat with Claude Code from your Home Assistant dashboard"
url: "https://github.com/MGrin/ha-claude-code"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 5100
ingress_stream: true
panel_icon: mdi:robot
panel_title: Claude Code
startup: services
init: false
boot: auto
hassio_api: true
homeassistant_api: true
hassio_role: default
map:
  - type: config
    read_only: true
  - type: share
    read_only: false
options:
  credentials_json: ""
schema:
  credentials_json: str?
