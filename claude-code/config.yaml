name: "Claude Code"
version: "0.2.1"
slug: "claude-code"
description: "Chat with Claude Code from your Home Assistant dashboard"
url: "https://github.com/MGrin/ha-claude-code"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 5100
ingress_stream: true
panel_icon: mdi:robot
panel_title: Claude Code
startup: services
init: false
boot: auto
map:
  - type: config
    read_only: true
  - type: share
    read_only: false
options:
  working_directory: "/config"
schema:
  working_directory: str?
